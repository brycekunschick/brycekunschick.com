<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bryce Kunschick</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="manifest" href="img/site.webmanifest">
</head>

<body>

    <header class="navbar">
        <div class="container nav-container">

            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <a href="index.html" class="logo">
                <span class="logo-initials">BK</span>
                <span class="logo-text">Bryce Kunschick</span>
            </a>

            <a href="contact.html" class="mobile-contact-btn">Contact</a>

            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About Me</a>
                <a href="fishing-dashboard.html" class="nav-link">Fishing Dashboard</a>
                <a href="my-projects.html" class="nav-link">My Projects</a>
                <a href="contact.html" class="nav-link active btn-nav-cta desktop-cta">Contact</a>
            </nav>

        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1 class="highlight">Let's Get in Touch!</h1>
            <p>Feel free to reach out through any of the options below.</p>
        </div>
    </section>

    <section class="contact-section fade-in-up">
        <div class="container">

            <div class="contact-actions">
                <a href="mailto:kunschickbryce@gmail.com" class="btn btn-primary btn-large">
                    <i class="fas fa-envelope"></i> Send an Email
                </a>
                <a href="https://www.linkedin.com/in/brycekunschick/" target="_blank" class="btn btn-outline btn-large">
                    <i class="fab fa-linkedin"></i> Connect on LinkedIn
                </a>
            </div>

            <div class="form-container-card">
                <div class="form-header">
                    <h3>Send a Message</h3>
                    <p>Or fill out the form below</p>
                </div>
                <div class="google-form-wrapper">
                    <iframe
                        src="https://docs.google.com/forms/d/e/1FAIpQLScVozh_JOF2wUmleheMhA86iy0X0xebQaYyWNe9MemLXyBdTg/viewform?embedded=true"
                        width="100%" height="800" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <div class="container footer-container">
            <div class="footer-left">
                <p>&copy; 2025 Bryce Kunschick</p>
                <a href="mailto:kunschickbryce@gmail.com" class="footer-email">kunschickbryce@gmail.com</a>
            </div>
            <div class="footer-right">
                <a href="https://www.linkedin.com/in/brycekunschick/" target="_blank"><i
                        class="fab fa-linkedin"></i></a>
                <a href="https://github.com/brycekunschick" target="_blank"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // Hamburger Menu
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector(".nav-menu");

        hamburger.addEventListener("click", () => {
            hamburger.classList.toggle("active");
            navMenu.classList.toggle("active");
        });

        // Animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        });
        const hiddenElements = document.querySelectorAll('.fade-in-up');
        hiddenElements.forEach((el) => observer.observe(el));
    </script>
</body>

</html>
