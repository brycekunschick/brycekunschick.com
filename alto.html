    <script>
        // --- 1. Animation Trigger (Fade In) ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        });
        const hiddenElements = document.querySelectorAll('.fade-in-up');
        hiddenElements.forEach((el) => observer.observe(el));

        // --- 2. Hamburger Menu ---
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector(".nav-menu");

        hamburger.addEventListener("click", () => {
            hamburger.classList.toggle("active");
            navMenu.classList.toggle("active");
        });

        // --- 3. Particle Background (Physics Based) ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        // Mouse object
        const mouse = {
            x: null,
            y: null,
            radius: 150
        };

        window.addEventListener('mousemove', function (event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function () {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                this.vx = directionX;
                this.vy = directionY;
                this.friction = 0.93;
                this.maxSpeed = 2.3;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                // 1. Gently pull back toward home position
                let homeDx = this.baseX - this.x;
                let homeDy = this.baseY - this.y;
                let homeDist = Math.sqrt(homeDx * homeDx + homeDy * homeDy) || 1;
                const homeForce = 0.02;

                this.vx += (homeDx / homeDist) * homeForce;
                this.vy += (homeDy / homeDist) * homeForce;

                // 2. Magnetic effect toward mouse when close
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius && distance > 10) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mouse.radius - distance) / mouse.radius;
                        const magneticStrength = 0.18;

                        this.vx += forceDirectionX * force * magneticStrength;
                        this.vy += forceDirectionY * force * magneticStrength;
                    }
                }

                // 3. Add slight base drift
                this.vx += this.directionX * 0.01;
                this.vy += this.directionY * 0.01;

                // 4. Apply friction
                this.vx *= this.friction;
                this.vy *= this.friction;

                // 5. Clamp speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }

                // 6. Update position
                this.x += this.vx;
                this.y += this.vy;

                // 7. Boundaries
                if (this.x > canvas.width - this.size) {
                    this.x = canvas.width - this.size;
                    this.vx *= -0.8;
                }
                if (this.x < this.size) {
                    this.x = this.size;
                    this.vx *= -0.8;
                }
                if (this.y > canvas.height - this.size) {
                    this.y = canvas.height - this.size;
                    this.vy *= -0.8;
                }
                if (this.y < this.size) {
                    this.y = this.size;
                    this.vy *= -0.8;
                }

                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;

            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = Math.random() * (innerWidth - size * 2) + size * 2;
                let y = Math.random() * (innerHeight - size * 2) + size * 2;
                let directionX = (Math.random() * 0.6) - 0.3;
                let directionY = (Math.random() * 0.6) - 0.3;
                let color = '#3B82F6';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a + 1; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = dx * dx + dy * dy;

                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        let opacityValue = 1 - (distance / 20000);
                        if (opacityValue <= 0) continue;

                        ctx.strokeStyle = 'rgba(59, 130, 246,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        window.addEventListener('resize', function () {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });

        init();
        animate();
    </script>
